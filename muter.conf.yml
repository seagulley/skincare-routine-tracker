# Muter mutation testing configuration
# Generate with: muter init (then review)
# Install Muter: brew install muter-mutation-testing/formulae/muter

arguments:
  - -project
  - SkincareTracker.xcodeproj
  - -scheme
  - SkincareTracker
  - -sdk
  - iphonesimulator
  - -destination
  - platform=iOS Simulator,name=iPhone 15,OS=17.2
  - SWIFT_TREAT_WARNINGS_AS_ERRORS=NO
  - test
executable: /usr/bin/xcodebuild
exclude:
  - SkincareTrackerApp.swift
  - /Views/
  - Assets.xcassets
