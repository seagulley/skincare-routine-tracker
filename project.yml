name: SkincareTracker
options:
  bundleIdPrefix: com.skincaretracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
targets:
  SkincareTracker:
    type: application
    platform: iOS
    sources:
      - path: SkincareTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skincaretracker.app
        INFOPLIST_FILE: SkincareTracker/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: SkincareTracker/Info.plist
      properties:
        UILaunchScreen:
          backgroundColor: "#F5F5F5"
        UIBackgroundModes:
          - remote-notification
        NSCalendarsUsageDescription: "Skincare Tracker needs calendar access to schedule reminders for your skincare routine."
        NSUserNotificationsUsageDescription: "Skincare Tracker sends reminders for when to apply your skincare products."
